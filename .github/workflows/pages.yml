name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build dependency
        run: python -m pip install latex2mathml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: python build.py

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p _site
          cp index.html _site/
          cp about.html _site/
          cp archive.html _site/
          cp styles.css _site/
          cp -r assets _site/assets
          cp -r posts _site/posts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
